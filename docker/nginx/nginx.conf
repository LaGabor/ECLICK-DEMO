# Laravel front controller pattern (see https://laravel.com/docs/deployment#nginx).
# PHP-FPM must receive the browser path as REQUEST_URI; after try_files rewrites to
# /index.php, some stacks pass REQUEST_URI=/index.php and no route matches — fix below.

server {

    listen 80;
    server_name localhost admin.localhost;

    root /var/www/php/public;
    index index.php index.html;

    charset utf-8;

    # Runs in the server rewrite phase before location try_files — captures the real URI+query.
    set $laravel_original_uri $request_uri;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param REQUEST_URI $laravel_original_uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_host;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

}
