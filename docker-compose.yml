services:
  nginx:
    image: nginx:1.27
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/php
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: laravel-backend
    restart: unless-stopped
    working_dir: /var/www/php
    volumes:
      - ./:/var/www/php
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # .env uses host machine DB/mail; inside Compose use service names.
      DB_HOST: mysql
      DB_PORT: "3306"
      MAIL_HOST: mailpit
    entrypoint: /var/www/php/docker/php/entrypoint.sh

  queue-worker-mail:
    image: laravel-backend
    restart: unless-stopped
    working_dir: /var/www/php
    volumes:
      - ./:/var/www/php
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_started
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      MAIL_HOST: mailpit
    entrypoint: ["/bin/sh", "/var/www/php/docker/php/wait-for-migrations.sh"]
    stop_grace_period: 60s

  node:
    image: node:22
    working_dir: /var/www/php
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/php
      - node_modules:/var/www/php/node_modules
    command: sh -lc "corepack enable && corepack prepare pnpm@9 --activate && pnpm install && pnpm run dev --host 0.0.0.0"
    environment:
      CHOKIDAR_USEPOLLING: "false"

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysql", "-h", "127.0.0.1", "-P", "3306", "-uroot", "-proot", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s

volumes:
  node_modules:
  mysql_data:
